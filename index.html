<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begumganj Load Shedding Monitor</title>
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .neo-brutal { box-shadow: 8px 8px 0px 0px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area 
        } = Recharts;
        const { motion, AnimatePresence } = FramerMotion;

        // --- AI API CONFIGURATION ---
        // আপনার API Key এখানে বসান (লিমিটেড বা ব্রাউজারে ব্যবহারের জন্য সাবধানে)
        const GEMINI_API_KEY = ""; 

        // --- MOCK DATA GENERATOR ---
        const generateData = () => {
            const data = [];
            for (let i = 0; i < 24; i++) {
                data.push({
                    time: `${i}:00`,
                    load: 40 + Math.floor(Math.random() * 50),
                    voltage: 210 + Math.floor(Math.random() * 20)
                });
            }
            return data;
        };

        // --- MAIN COMPONENT ---
        const App = () => {
            const [lang, setLang] = useState('bn');
            const [data] = useState(generateData());
            const [isAiLoading, setIsAiLoading] = useState(false);

            const t = {
                bn: {
                    title: 'বেগমগঞ্জ লোডশেডিং মনিটর',
                    status: 'বর্তমান অবস্থা',
                    online: 'বিদ্যুৎ আছে',
                    offline: 'লোডশেডিং',
                    update: 'সর্বশেষ আপডেট: ১ মিনিট আগে'
                },
                en: {
                    title: 'Begumganj Power Monitor',
                    status: 'Current Status',
                    online: 'Online',
                    offline: 'Outage',
                    update: 'Last update: 1m ago'
                }
            };

            const cur = t[lang];

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="bg-white border-b-4 border-slate-900 p-6 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-yellow-400 border-4 border-slate-900 flex items-center justify-center">
                                <i data-lucide="zap" className="w-6 h-6 text-slate-900"></i>
                            </div>
                            <h1 className="text-2xl font-black uppercase tracking-tighter text-slate-900">
                                {cur.title}
                            </h1>
                        </div>
                        <button 
                            onClick={() => setLang(lang === 'bn' ? 'en' : 'bn')}
                            className="bg-slate-900 text-white px-4 py-2 font-bold text-xs uppercase transition-transform active:scale-95"
                        >
                            {lang === 'bn' ? 'English' : 'বাংলা'}
                        </button>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
                        {/* Status Card */}
                        <div className="bg-white border-4 border-slate-900 p-8 flex flex-col md:flex-row justify-between items-center gap-8 shadow-[10px_10px_0px_0px_rgba(0,0,0,0.1)]">
                            <div className="space-y-2 text-center md:text-left">
                                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">{cur.status}</span>
                                <div className="flex items-center gap-4 justify-center md:justify-start">
                                    <div className="w-4 h-4 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <h2 className="text-5xl font-black text-slate-900 uppercase">{cur.online}</h2>
                                </div>
                                <p className="text-xs font-bold text-slate-400">{cur.update}</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="text-center p-4 bg-slate-50 border-2 border-slate-100 min-w-[100px]">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Voltage</p>
                                    <p className="text-xl font-black text-slate-900">224V</p>
                                </div>
                                <div className="text-center p-4 bg-slate-50 border-2 border-slate-100 min-w-[100px]">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Load</p>
                                    <p className="text-xl font-black text-slate-900">82%</p>
                                </div>
                            </div>
                        </div>

                        {/* Chart Section */}
                        <div className="bg-white border-4 border-slate-900 p-6 shadow-[10px_10px_0px_0px_rgba(30,41,59,0.05)]">
                            <h3 className="text-lg font-black uppercase mb-6 flex items-center gap-2">
                                <i data-lucide="bar-chart-3" className="w-5 h-5 text-blue-600"></i>
                                {lang === 'bn' ? 'গত ২৪ ঘণ্টার গ্রিড রিপোর্ট' : 'Grid Performance (24h)'}
                            </h3>
                            <div className="h-[300px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={data}>
                                        <defs>
                                            <linearGradient id="colorLoad" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis dataKey="time" hide />
                                        <Tooltip 
                                            contentStyle={{ 
                                                backgroundColor: '#1e293b', 
                                                border: 'none', 
                                                borderRadius: '0', 
                                                color: '#fff',
                                                fontSize: '12px'
                                            }} 
                                        />
                                        <Area type="monotone" dataKey="load" stroke="#3b82f6" fillOpacity={1} fill="url(#colorLoad)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* AI & Notice Board */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                             <div className="bg-slate-900 text-white p-8 border-b-8 border-yellow-400">
                                <h3 className="text-xl font-black uppercase mb-4 tracking-tighter">AI Prediction</h3>
                                <p className="text-sm opacity-70 mb-6 font-medium">Smart AI Grid analysis system to detect potential load shedding risks in Noakhali region.</p>
                                <button className="w-full py-4 bg-yellow-400 text-slate-900 font-black uppercase text-xs tracking-widest hover:bg-white transition-colors">
                                    Check AI Forecast
                                </button>
                             </div>
                             <div className="bg-white border-4 border-slate-900 p-8">
                                <h3 className="text-xl font-black uppercase mb-4 text-slate-900">PDB Notice Board</h3>
                                <p className="text-sm text-slate-500 mb-6 font-medium">Check official announcements and critical updates directly from the Power Development Board.</p>
                                <a href="https://bpdb.gov.bd/notice-board" target="_blank" className="block text-center w-full py-4 bg-slate-900 text-white font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition-colors">
                                    Visit Notice Board
                                </a>
                             </div>
                        </div>
                    </main>

                    {/* Footer Toggle */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-slate-900 p-4 flex justify-around">
                         <i data-lucide="home" className="w-6 h-6 text-slate-900"></i>
                         <i data-lucide="bell" className="w-6 h-6 text-slate-400"></i>
                         <i data-lucide="file-text" className="w-6 h-6 text-slate-400"></i>
                         <i data-lucide="settings" className="w-6 h-6 text-slate-400"></i>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Icons after React render
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
