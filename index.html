<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বেগমগঞ্জ বিদ্যুৎ আপডেট</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 2px solid #38bdf8; }
        .status-card { background: #1e293b; margin: 20px; padding: 20px; border-radius: 15px; border-left: 5px solid #22c55e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .update-box { padding: 15px; background: rgba(56, 189, 248, 0.1); margin: 20px; border-radius: 10px; border: 1px dashed #38bdf8; }
        .btn { display: block; background: #38bdf8; color: #0f172a; text-align: center; padding: 12px; margin: 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .footer { margin-top: auto; padding: 15px; text-align: center; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="header">
        <h2>বেগমগঞ্জ বিদ্যুৎ আপডেট</h2>
        <p>খোয়াজপুর ও আশেপাশের এলাকা</p>
    </div>

    <div class="status-card">
        <h3>বর্তমান অবস্থা: <span style="color: #22c55e;">সচল (বিদ্যুৎ আছে)</span></h3>
        <p>সর্বশেষ আপডেট: আজ রাত ১২:৩০</p>
    </div>

    <div class="update-box">
        <strong>জানেন কি?</strong><br>
        বেগমগঞ্জ গ্রিড থেকে বর্তমানে লোডশেডিংয়ের কোনো ঘোষণা আসেনি।
    </div>

    <a href="tel:16677" class="btn">জরুরি হেল্পলাইন (১৬৬৭৭)</a>

    <div class="footer">
        তৈরি করেছেন: ফয়সাল কবির রাব্বি | মিধ্যা বাড়ি, খোয়াজপুর
    </div>
</body>
</html>
